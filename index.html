<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficas Star Wars</title>
    <link rel="stylesheet" href="./styles.css?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist/dist/chartist.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chartist/dist/chartist.min.js"></script>
    
</head>
<body>
    <h1>Gráficas Star Wars</h1>
    <h2>Películas por año de lanzamiento</h2>
    <figure>
        <div class="ct-chart" aria-label="Line chart showcasing Star Wars movies by release year">
        <!-- gráfica de star wars API -->
        </div>
        <figcaption>Películas de Star Wars por año de lanzamiento</figcaption>
    </figure>

    <h2>Número de Películas en las que aparece cada Personaje</h2>
    <figure>
        <div class="ct-chart1" aria-label="Line chart showcasing Star Wars movies by release year">
        <!-- gráfica de star wars API -->
        </div>
        <figcaption>Personajes que aparecen en almenos 3 Películas de Star Wars</figcaption>
    </figure>


    <!-- My Script -->
    <script src="script.js"></script>
</body>
</html>
